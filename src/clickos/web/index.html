<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClickOS — Ordens de Serviço</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app" style="display:none">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-ico"><span class="ic" data-icon="wrench"></span></div>
        <div>
          <div class="brand-name">ClickOS</div>
          <div class="brand-sub">Ordens de Serviço</div>
        </div>
      </div>
      <div class="menu-title">MENU PRINCIPAL</div>
      <nav class="menu">
        <a data-view="dashboard"><span class="ic" data-icon="grid"></span><span>Dashboard</span></a>
        <a data-view="orcamentos"><span class="ic" data-icon="doc"></span><span>Orçamentos</span></a>
        <a data-view="documentos"><span class="ic" data-icon="file"></span><span>Ordens de Serviço</span></a>
        <a data-view="clientes"><span class="ic" data-icon="users"></span><span>Pessoas</span></a>
        <a data-view="veiculos"><span class="ic" data-icon="car"></span><span>Veículos</span></a>
        <a data-view="produtos"><span class="ic" data-icon="box"></span><span>Produtos e Serviços</span></a>
      </nav>
      <div class="sidebar-bottom">
        <button class="cfg-btn" id="btn-config"><span class="ic" data-icon="settings"></span><span>Configurações</span></button>
        <div class="user-box" id="user-box" style="display:none">
          <div class="user-ava" id="user-ava"><span class="ic" data-icon="user"></span></div>
          <div class="user-info"><div class="user-name" id="user-name"></div><div class="user-role">Conectado</div></div>
          <button class="user-logout" id="btn-logout" title="Sair"><span class="ic" data-icon="logout"></span></button>
        </div>
      </div>
    </aside>
    <main id="main" class="main"></main>
  </div>

  <div id="modal-root"></div>
  <div id="toast-root"></div>
  <iframe id="print-frame" style="position:fixed;width:0;height:0;border:0;left:-9999px"></iframe>

  <script src="app.js"></script>
</body>
</html>
